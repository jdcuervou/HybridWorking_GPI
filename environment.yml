name: hybridworking-gpi
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Core data science
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  
  # Statistical analysis
  - statsmodels>=0.14
  - scikit-learn>=1.3
  
  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  
  # Data acquisition
  - requests>=2.31
  
  # Development tools
  - jupyter>=1.0
  - ipykernel>=6.25
  
  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1
  
  # Code quality
  - black>=23.0
  - flake8>=6.0
  
  # Documentation
  - sphinx>=7.0
